<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer 360° (Modelo)</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
    }
    #uploadBox {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(0,0,0,.65);
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
    }
    input {
      display: none;
    }
  </style>
</head>
<body>

<label id="uploadBox">
  📁 Carregar imagem 360
  <input type="file" id="upload" accept="image/*">
</label>

<div id="viewer"></div>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>

<script>
let viewer;

document.getElementById("upload").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const imageURL = URL.createObjectURL(file);

  if (viewer) {
    viewer.destroy();
  }

  viewer = pannellum.viewer("viewer", {
    type: "equirectangular",
    panorama: imageURL,
    autoLoad: true,
    showControls: true,
    hfov: 100,
    minHfov: 40,
    maxHfov: 120
  });
});
</script>

</body>
</html>
