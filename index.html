<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viewer 360°</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

<div id="viewer"></div>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>

<script>
pannellum.viewer('viewer', {
  type: 'equirectangular',
  panorama: 'ChatGPT Image 26 de abr. de 2026, 15_22_27.png', // 🔁 TROQUE AQUI PELO NOME DA SUA IMAGEM
  autoLoad: true,
  showControls: true,
  hfov: 100,
  minHfov: 40,
  maxHfov: 120
});
</script>

</body>
</html>
